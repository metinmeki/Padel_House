name: Deploy to VPS

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_IP }}
          username: deployer
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo bash /usr/local/bin/deploy_padel.sh
