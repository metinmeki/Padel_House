<div id="loader-overlay">
  <div class="loader-content">

    <div class="player-wrapper">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="ballGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#E57625" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#E57625" stop-opacity="0"/>
          </radialGradient>
        </defs>

        <ellipse cx="100" cy="180" rx="40" ry="8" fill="rgba(0,0,0,0.3)" class="shadow-anim"/>

        <g class="player-main">
          <path d="M85 165 L95 120 L105 120 L115 165" stroke="#ffffff" stroke-width="12" stroke-linecap="round" fill="none"/>
          <rect x="88" y="80" width="24" height="45" rx="12" fill="#ffffff" />
          <circle cx="100" cy="65" r="18" fill="#ffffff"/>

          <g class="swing-arm">
            <path d="M90 90 L60 80" stroke="#ffffff" stroke-width="10" stroke-linecap="round"/>
            <g transform="translate(45, 65) rotate(-20)">
              <rect x="-4" y="20" width="8" height="25" rx="4" fill="#E57625"/>
              <path d="M-15 -10 Q-15 -25 0 -25 Q15 -25 15 -10 L15 10 Q15 25 0 25 Q-15 25 -15 10 Z"
                    fill="none" stroke="#E57625" stroke-width="5"/>
              <path d="M-10 -5 L10 5 M-10 5 L10 -5" stroke="#E57625" stroke-width="1" opacity="0.5"/>
            </g>
          </g>
        </g>

        <g class="ball-group">
            <circle cx="100" cy="100" r="15" fill="url(#ballGlow)" class="ball-outer"/>
            <circle cx="160" cy="70" r="8" fill="#E57625" class="ball-inner"/>
        </g>
      </svg>
    </div>

    <div class="brand-box">
      <h1 class="title">PADEL <span>HOUSE</span></h1>
      <div class="location-tag">
        <span class="dot"></span>
        DUHOK
        <span class="dot"></span>
      </div>
    </div>

    <div class="progress-container">
      <div class="progress-track">
        <div class="progress-bar"></div>
      </div>
    </div>
  </div>
</div>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

#loader-overlay {
  position: fixed;
  inset: 0;
  z-index: 999999;
  background: radial-gradient(circle at center, #252545 0%, #1a1a2e 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Inter', sans-serif;
  transition: opacity 0.4s ease, transform 0.4s ease;
}

.loader-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
}

/* Character Styling */
.player-wrapper {
  width: 220px;
  height: 220px;
  filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
}

.swing-arm {
  transform-origin: 90px 90px;
  animation: proSwing 1.2s ease-in-out infinite;
}

.ball-inner {
  animation: ballPath 1.2s ease-in-out infinite;
}

.shadow-anim {
  animation: shadowPulse 1.2s ease-in-out infinite;
}

@keyframes proSwing {
  0%, 100% { transform: rotate(-10deg); }
  50% { transform: rotate(30deg); }
}

@keyframes ballPath {
  0%, 100% { transform: translate(0, 0); opacity: 1; }
  50% { transform: translate(-120px, -30px); opacity: 0.8; }
}

@keyframes shadowPulse {
  0%, 100% { transform: scaleX(1); opacity: 0.3; }
  50% { transform: scaleX(1.2); opacity: 0.1; }
}

/* Typography UI */
.brand-box {
  text-align: center;
  margin-top: 20px;
}

.title {
  color: #ffffff;
  font-size: 38px;
  font-weight: 900;
  letter-spacing: -1px;
  margin: 0;
  text-transform: uppercase;
  animation: fadeUp 0.8s ease out forwards;
}

.title span {
  color: #E57625;
  -webkit-text-stroke: 1px #E57625;
  -webkit-text-fill-color: transparent;
}

.location-tag {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: rgba(255,255,255,0.6);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 4px;
  margin-top: 5px;
  animation: fadeUp 0.8s ease out 0.2s forwards;
  opacity: 0;
}

.dot {
  width: 4px;
  height: 4px;
  background: #E57625;
  border-radius: 50%;
}

/* Modern Progress Bar */
.progress-container {
  width: 200px;
  margin-top: 40px;
}

.progress-track {
  height: 4px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

.progress-bar {
  position: absolute;
  height: 100%;
  width: 40%;
  background: linear-gradient(90deg, transparent, #E57625, transparent);
  animation: slideProgress 1.5s infinite linear;
}

@keyframes slideProgress {
  0% { left: -40%; }
  100% { left: 100%; }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Exit Animation */
.loader-finished {
  opacity: 0 !important;
  transform: scale(1.05) !important;
  pointer-events: none;
}
</style>

<script>
(function() {
  // ⚡ FASTER LOADING - 800ms minimum (reduced from 2000ms)
  const minTime = 800;
  const startTime = performance.now();

  // Check if page is already loaded
  if (document.readyState === 'complete') {
    hideLoader();
  } else {
    window.addEventListener('load', hideLoader);
  }

  function hideLoader() {
    const elapsed = performance.now() - startTime;
    const remaining = Math.max(0, minTime - elapsed);

    setTimeout(() => {
      const loader = document.getElementById('loader-overlay');
      if (loader) {
        loader.classList.add('loader-finished');
        // Remove from DOM after transition
        setTimeout(() => {
          loader.remove();
        }, 400);
      }
    }, remaining);
  }

  // Fallback: Force hide after 5 seconds max
  setTimeout(() => {
    const loader = document.getElementById('loader-overlay');
    if (loader && !loader.classList.contains('loader-finished')) {
      console.warn('Loader forced hide after 5s timeout');
      loader.classList.add('loader-finished');
      setTimeout(() => loader.remove(), 400);
    }
  }, 1000);
})();
</script>
