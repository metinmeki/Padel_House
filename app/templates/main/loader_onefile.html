<!-- PADEL HOUSE - Clean UX/UI Loader with Animated Player -->
<!-- Add this RIGHT AFTER <body> tag -->
<div id="loader-overlay" style="position:fixed;inset:0;z-index:999999;background:#1a1a2e;">
  <div class="loader-container">

    <!-- Animated Player with Racket -->
    <div class="player-animation">
      <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">

        <!-- Player Body -->
        <g class="player">
          <!-- Head -->
          <circle cx="100" cy="55" r="18" fill="#ffffff"/>

          <!-- Body -->
          <path d="M100 73 L100 120" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>

          <!-- Left Arm (holding racket) -->
          <g class="arm-racket">
            <path d="M100 85 L65 70" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>

            <!-- Racket -->
            <g class="racket" transform="translate(45, 45)">
              <ellipse cx="0" cy="0" rx="20" ry="26" stroke="#E57625" stroke-width="4" fill="none"/>
              <!-- Racket strings -->
              <line x1="-12" y1="0" x2="12" y2="0" stroke="#E57625" stroke-width="1.5" opacity="0.6"/>
              <line x1="0" y1="-16" x2="0" y2="16" stroke="#E57625" stroke-width="1.5" opacity="0.6"/>
              <!-- Handle -->
              <path d="M0 26 L0 45" stroke="#E57625" stroke-width="5" stroke-linecap="round"/>
            </g>
          </g>

          <!-- Right Arm -->
          <path d="M100 85 L130 105" stroke="#ffffff" stroke-width="7" stroke-linecap="round" class="right-arm"/>

          <!-- Left Leg -->
          <path d="M100 120 L80 165" stroke="#ffffff" stroke-width="8" stroke-linecap="round" class="left-leg"/>

          <!-- Right Leg -->
          <path d="M100 120 L120 165" stroke="#ffffff" stroke-width="8" stroke-linecap="round" class="right-leg"/>
        </g>

        <!-- Ball -->
        <circle class="ball" cx="160" cy="60" r="10" fill="#E57625"/>

        <!-- Ground Shadow -->
        <ellipse cx="100" cy="175" rx="35" ry="6" fill="rgba(255,255,255,0.1)" class="shadow"/>

      </svg>
    </div>

    <!-- Brand -->
    <div class="loader-brand">
      <h1>Padel House</h1>
      <span class="loader-location">Duhok</span>
    </div>

    <!-- Minimal Progress -->
    <div class="loader-progress">
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
    </div>

  </div>
</div>

<style>
/* ===== LOADER STYLES ===== */
#loader-overlay {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  right: 0 !important;
  bottom: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 999999 !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  background: #1a1a2e !important;
  margin: 0 !important;
  padding: 0 !important;
  border: none !important;
  transition: opacity 0.5s ease;
}

#loader-overlay.loader-hide {
  opacity: 0 !important;
  pointer-events: none !important;
}

#loader-overlay .loader-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 40px;
  background: transparent !important;
  margin: 0;
  padding: 0;
  border: none;
  box-shadow: none;
}

/* Player Animation */
#loader-overlay .player-animation {
  width: 180px;
  height: 180px;
  background: transparent !important;
}

#loader-overlay .player-animation svg {
  width: 100%;
  height: 100%;
  overflow: visible;
}

/* Swing Animation */
#loader-overlay .arm-racket {
  transform-origin: 100px 85px;
  animation: loaderSwing 1.2s ease-in-out infinite;
}

@keyframes loaderSwing {
  0%, 100% { transform: rotate(-15deg); }
  50% { transform: rotate(25deg); }
}

/* Ball Animation */
#loader-overlay .ball {
  animation: loaderBallMove 1.2s ease-in-out infinite;
}

@keyframes loaderBallMove {
  0%, 40% { cx: 160; cy: 60; }
  50% { cx: 50; cy: 40; }
  60%, 100% { cx: 160; cy: 60; }
}

/* Body movement */
#loader-overlay .player {
  animation: loaderBodyMove 1.2s ease-in-out infinite;
}

@keyframes loaderBodyMove {
  0%, 100% { transform: translateX(0); }
  50% { transform: translateX(-3px); }
}

/* Right arm */
#loader-overlay .right-arm {
  transform-origin: 100px 85px;
  animation: loaderRightArm 1.2s ease-in-out infinite;
}

@keyframes loaderRightArm {
  0%, 100% { transform: rotate(5deg); }
  50% { transform: rotate(-10deg); }
}

/* Legs */
#loader-overlay .left-leg {
  transform-origin: 100px 120px;
  animation: loaderLeftLeg 1.2s ease-in-out infinite;
}

#loader-overlay .right-leg {
  transform-origin: 100px 120px;
  animation: loaderRightLeg 1.2s ease-in-out infinite;
}

@keyframes loaderLeftLeg {
  0%, 100% { transform: rotate(3deg); }
  50% { transform: rotate(-3deg); }
}

@keyframes loaderRightLeg {
  0%, 100% { transform: rotate(-3deg); }
  50% { transform: rotate(3deg); }
}

/* Shadow */
#loader-overlay .shadow {
  animation: loaderShadow 1.2s ease-in-out infinite;
}

@keyframes loaderShadow {
  0%, 100% { transform: scaleX(1); opacity: 0.1; }
  50% { transform: scaleX(1.1); opacity: 0.15; }
}

/* Brand */
#loader-overlay .loader-brand {
  text-align: center;
  background: transparent !important;
}

#loader-overlay .loader-brand h1 {
  margin: 0;
  font-size: 32px;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: 2px;
  background: transparent !important;
}

#loader-overlay .loader-location {
  display: block;
  margin-top: 8px;
  font-size: 12px;
  color: #E57625;
  letter-spacing: 4px;
  text-transform: uppercase;
  font-weight: 500;
}

/* Progress Bar */
#loader-overlay .loader-progress {
  width: 180px;
  background: transparent !important;
}

#loader-overlay .progress-bar {
  height: 3px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 3px;
  overflow: hidden;
}

#loader-overlay .progress-fill {
  height: 100%;
  width: 30%;
  background: #E57625;
  border-radius: 3px;
  animation: loaderProgress 1.4s ease-in-out infinite;
}

@keyframes loaderProgress {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(450%); }
}

/* Mobile */
@media (max-width: 480px) {
  #loader-overlay .player-animation {
    width: 140px;
    height: 140px;
  }

  #loader-overlay .loader-brand h1 {
    font-size: 26px;
  }

  #loader-overlay .loader-progress {
    width: 140px;
  }
}
</style>

<script>
(function() {
  var MIN_SHOW = 2500;
  var start = Date.now();

  function hideLoader() {
    var el = document.getElementById("loader-overlay");
    if (!el) return;

    // Add hide class for fade out
    el.classList.add("loader-hide");

    // Completely remove from DOM after fade
    setTimeout(function() {
      if (el && el.parentNode) {
        el.parentNode.removeChild(el);
      }
    }, 500);
  }

  // Hide when page fully loads
  window.addEventListener("load", function() {
    var elapsed = Date.now() - start;
    var wait = Math.max(0, MIN_SHOW - elapsed);
    setTimeout(hideLoader, wait);
  });

  // Fallback: hide after 6 seconds no matter what
  setTimeout(hideLoader, 6000);

  // Global function to manually hide
  window.hideLoader = hideLoader;
})();
</script>
